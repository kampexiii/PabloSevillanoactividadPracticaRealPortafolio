<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Portafolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Bienvenido a mi Portafolio</h1>
  <p>Este es un proyecto de práctica con Git y GitHub.</p>

  <h2>Contacto</h2>
  <form>
    <label>Nombre<br><input type="text" name="nombre" placeholder="Tu nombre"></label><br><br>
    <label>Email<br><input type="email" name="email" placeholder="tu@correo.com"></label><br><br>
    <label>Mensaje<br><textarea name="mensaje" rows="4" placeholder="Escribe tu mensaje"></textarea></label><br><br>
    <button type="submit">Enviar mensaje</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
